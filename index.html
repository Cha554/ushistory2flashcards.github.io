<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            color: #93c5fd;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .menu-container {
            width: 100%;
            margin-bottom: 2rem;
        }

        label {
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--text);
        }

        select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 2px solid var(--border);
            background-color: white;
            font-size: 1rem;
            color: var(--text);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-light);
        }

        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 400px;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .card-front {
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 8px solid var(--primary-light);
        }

        .card-front h2 {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .card-front .hint {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-back {
            transform: rotateY(180deg);
            border-left: 8px solid #10b981;
        }

        .card-back h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .card-back ul {
            list-style-type: none;
            text-align: left;
            width: 100%;
        }

        .card-back li {
            margin-bottom: 0.75rem;
            line-height: 1.5;
            font-size: 1.05rem;
        }

        .card-back strong {
            color: var(--text);
            background-color: #f1f5f9;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            flex: 1;
            max-width: 160px;
        }

        button:hover {
            background-color: var(--primary-light);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-light);
            cursor: not-allowed;
        }

        .counter {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-light);
            flex: 2;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            .flashcard-wrapper {
                height: 450px;
            }
            .card-face {
                padding: 1.5rem;
            }
            .card-front h2 {
                font-size: 1.4rem;
            }
            .card-back li {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

    <div class="container">

        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">

                </div>
                <div class="card-face card-back" id="card-back-text">
                    </div>

        <div class="controls">

        </div>

            },

            },
            {

            },
            {
                unit: "depression",

                back: "<h3>Landmark New Deal Agencies</h3><ul><li><strong>AAA:</strong> Subsidized farmers to reduce crop production to raise deflated market prices.</li><li><strong>NIRA:</strong> Set industry codes and fair prices; later ruled unconstitutional by Supreme Court.</li><li><strong>TVA:</strong> Built dams to control floods and bring cheap electricity to the impoverished Tennessee Valley.</li><li><strong>Wagner Act:</strong> Legalized and protected unions' rights to organize and collectively bargain.</li><li><strong>Social Security Act (1935):</strong> Established old-age pensions, unemployment insurance, and aid for disabled citizens.</li></ul>"

        let currentCards = [...flashcardsData];
        let currentIndex = 0;

        const cardElement = document.getElementById('card');
        const frontText = document.getElementById('card-front-text');
        const backText = document.getElementById('card-back-text');
        const counterElement = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function updateCard() {
            if (currentCards.length === 0) {
                frontText.textContent = "No cards available in this unit.";
                backText.innerHTML = "";
                counterElement.textContent = "0 / 0";
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            cardElement.classList.remove('is-flipped');
            
            // Wait for flip back animation before changing text
            setTimeout(() => {
                frontText.textContent = currentCards[currentIndex].front;
                backText.innerHTML = currentCards[currentIndex].back;
                counterElement.textContent = `${currentIndex + 1} / ${currentCards.length}`;
                
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === currentCards.length - 1;
            }, 150);
        }

        function flipCard() {
            if (currentCards.length > 0) {
                cardElement.classList.toggle('is-flipped');
            }
        }

        function nextCard(event) {
            event.stopPropagation(); // Stop card from flipping when clicking button
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard(event) {
            event.stopPropagation(); // Stop card from flipping when clicking button
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function changeUnit() {
            const select = document.getElementById('unit-select');
            const selectedUnit = select.value;

            if (selectedUnit === 'all') {
                currentCards = [...flashcardsData];
            } else {
                currentCards = flashcardsData.filter(card => card.unit === selectedUnit);
            }

            currentIndex = 0;
            updateCard();
        }

        // Initialize first view
        updateCard();

        // Keyboard navigation support
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                flipCard();
            } else if (e.key === 'ArrowRight') {
                if (currentIndex < currentCards.length - 1) {
                    currentIndex++;
                    updateCard();
                }
            } else if (e.key === 'ArrowLeft') {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateCard();
                }
            }
        });
